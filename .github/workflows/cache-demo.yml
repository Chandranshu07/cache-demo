name: Cache Demo

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js (example dependency)
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Cache dependencies
      id: prime-cache-054bf26
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: cache-054bf26

    - name: Install dependencies
      run: npm install

    - name: Show cache result
      run: echo "Cache hit: ${{ steps.prime-cache-054bf26.outputs.cache-hit }}"
